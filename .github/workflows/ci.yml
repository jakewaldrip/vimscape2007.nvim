name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vimscape_backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vimscape_backend

      - name: Build
        run: cargo build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vimscape_backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup component add clippy rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vimscape_backend

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vimscape_backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vimscape_backend

      - name: Run tests
        run: cargo test
